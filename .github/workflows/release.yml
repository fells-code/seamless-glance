name: Build & Release Seamless Glance

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-latest

    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version =' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          if [[ "${GITHUB_REF##*/}" == "dev" ]]; then
            VERSION="$VERSION-beta.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Cache cargo (macOS)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-macos-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          BIN=seamless-glance
          OUT=seamless-glance-${{ steps.version.outputs.version }}-${{ matrix.target }}
          mv target/${{ matrix.target }}/release/$BIN $OUT

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: seamless-glance-*

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version =' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          if [[ "${GITHUB_REF##*/}" == "dev" ]]; then
          VERSION="$VERSION-beta.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - name: Build
        run: cargo build --profile release-linux --target x86_64-unknown-linux-gnu

      - name: Rename binary
        run: |
          BIN=seamless-glance
          OUT=seamless-glance-${{ steps.version.outputs.version }}-x86_64-unknown-linux-gnu
          mv target/x86_64-unknown-linux-gnu/release-linux/$BIN $OUT

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: seamless-glance-*

  publish:
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux]

    steps:
      - name: Checkout distro repo
        uses: actions/checkout@v4
        with:
          repository: fells-code/seamless-glance-distro
          token: ${{ secrets.SEAMLESS_GLANCE_GH_TOKEN }}

      - name: "Download build artifacts"
        uses: actions/download-artifact@v4

      - name: Determine version
        id: version
        run: |
          VERSION=$(grep '^version =' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          if [[ "${GITHUB_REF##*/}" == "dev" ]]; then
            VERSION="$VERSION-beta.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Publish release to distro repo
        uses: softprops/action-gh-release@v2
        with:
          repository: fells-code/seamless-glance-distro
          tag_name: v${{ steps.version.outputs.version }}
          name: Seamless Glance v${{ steps.version.outputs.version }}
          prerelease: ${{ github.ref_name == 'dev' }}
          files: |
            **/seamless-glance-*
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.DISTRO_REPO_TOKEN }}
