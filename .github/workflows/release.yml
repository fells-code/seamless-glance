name: Build & Release Seamless Glance

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: macos-latest

    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
          - x86_64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set version
        id: version
        run: |
          VERSION=$(grep '^version =' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          if [[ "${GITHUB_REF##*/}" == "dev" ]]; then
            VERSION="$VERSION-beta.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          BIN=seamless-glance
          OUT=seamless-glance-${{ steps.version.outputs.version }}-${{ matrix.target }}
          mv target/${{ matrix.target }}/release/$BIN $OUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: seamless-glance-*


  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Seamless Glance v${{ needs.build.outputs.version }}
          prerelease: ${{ github.ref_name == 'dev' }}
          files: |
            **/seamless-glance-*
